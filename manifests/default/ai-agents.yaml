apiVersion: v1
kind: Service
metadata:
  name: ai-agents
  namespace: bharatradar
  labels:
    app: ai-agents
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: ai-agents
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agents
  namespace: bharatradar
  labels:
    app: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agents
  template:
    metadata:
      labels:
        app: ai-agents
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: agents
          image: ghcr.io/bharatradar/ai-agents:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: "SHARED_SERVICES_HOST"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flight_db"
            - name: DB_USER
              value: "flight_db_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flight-db-credentials
                  key: password
            - name: REDIS_HOST
              value: "SHARED_SERVICES_HOST"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: BOT_ENGINE_MODE
              value: "fast_router"
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-credentials
                  key: telegram_token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-credentials
                  key: telegram_chat_id
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-credentials
                  key: groq_api_key
            - name: CLOUDFLARE_KEYS
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-credentials
                  key: cloudflare_keys
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"