# BharatRadar Schedule Downloader CronJob
# Runs daily at 22:00 UTC (03:30 IST) to download next day's schedules.
# For manual runs, use: kubectl create job --from=cronjob/schedule-downloader sched-xxx
#   then: kubectl set env job/sched-xxx SCHEDULE_DAYS=today
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: schedule-downloader
  namespace: bharatradar
  labels:
    app: schedule-downloader
    component: data-pipeline
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: schedule-downloader
        spec:
          restartPolicy: OnFailure
          serviceAccountName: schedule-downloader
          volumes:
          - name: aerodatabox-logs
            hostPath:
              path: /data/aerodatabox
              type: DirectoryOrCreate
          imagePullSecrets:
          - name: ghcr-secret
          containers:
          - name: downloader
            image: ghcr.io/bharatradar/schedule-downloader:latest
            imagePullPolicy: Always
            env:
            - name: DB_HOST
              value: "45.88.189.38"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flight_db"
            - name: DB_USER
              value: "flight_db_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flight-db-credentials
                  key: password
            - name: RAPIDAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: aerodatabox-credentials
                  key: rapidapi_key
            - name: RAPIDAPI_KEY_1
              valueFrom:
                secretKeyRef:
                  name: aerodatabox-credentials
                  key: rapidapi_key_1
            - name: RAPIDAPI_KEY_2
              valueFrom:
                secretKeyRef:
                  name: aerodatabox-credentials
                  key: rapidapi_key_2
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-credentials
                  key: telegram_token
            - name: TELEGRAM_ALERT_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-credentials
                  key: telegram_chat_id
            - name: AIRLINES_FILE
              value: "/opt/bharatradar/flight_radar/data/airlines.csv"
            volumeMounts:
            - name: aerodatabox-logs
              mountPath: /data/aerodatabox
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: schedule-downloader
  namespace: bharatradar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: schedule-downloader
  namespace: bharatradar
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: schedule-downloader
  namespace: bharatradar
subjects:
- kind: ServiceAccount
  name: schedule-downloader
  namespace: bharatradar
roleRef:
  kind: Role
  name: schedule-downloader
  apiGroup: rbac.authorization.k8s.io
