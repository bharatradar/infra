apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: api
spec:
  imageRepositoryRef:
    name: api
  policy:
    semver:
      range: ">=1.0.0"
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: api
spec:
  image: ghcr.io/bharatradar/api
  interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: api
spec:
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@flux.cd
        name: flux
      messageTemplate: '{{range .Updated.Images}}{{println .}}{{end}} [ci skip]'
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: infra
  update:
    path: ./manifests/default
    strategy: Setters
