---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: bharatradar
  labels:
    app: webapp
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: webapp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: bharatradar
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: webapp
          image: ghcr.io/bharatradar/webapp:v2025.05.07.10
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DB_HOST
              value: "192.168.200.15"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flight_db"
            - name: DB_USER
              value: "flight_db_user"
            - name: DB_PASSWORD
              value: "flight_db_password"
            - name: REDIS_HOST
              value: "192.168.200.15"
            - name: REDIS_PORT
              value: "6379"
            - name: INFLUXDB_URL
              value: "http://192.168.200.15:8086"
            - name: INFLUXDB_ORG
              value: "Vellur"
            - name: GOOGLE_REDIRECT_URI
              value: "https://bharat-radar.vellur.in/auth/callback"
            - name: ENABLE_WEB_NOTIFICATIONS
              value: "false"
            - name: WS_ENABLED
              value: "false"
            - name: BOT_ENGINE_MODE
              value: "fast_router"
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
            requests:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /command_center/api/filters
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /command_center/api/filters
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10