resources:
- ../base
namePrefix: reapi-
patches:
- target:
    kind: Deployment
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/args
      value: ["--net-only", "--net", "--net-receiver-id", "--net-connector=hub-readsb,30005,beast_in", "--net-api-port=30152", "--device-type=none"]
    - op: replace
      path: /spec/template/spec/containers/0/livenessProbe
      value: null
    - op: replace
      path: /spec/template/spec/containers/0/readinessProbe
      value: null
    - op: replace
      path: /spec/template/spec/containers/0/startupProbe
      value: null
