---
apiVersion: v1
kind: Service
metadata:
  name: cortex-webapp
  namespace: bharatradar
  labels:
    app: cortex-webapp
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: cortex-webapp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-webapp
  namespace: bharatradar
  labels:
    app: cortex-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-webapp
  template:
    metadata:
      labels:
        app: cortex-webapp
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cortex-webapp
          image: ghcr.io/bharatradar/cortex-webapp:v2026.05.08.08
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DB_HOST
              value: "192.168.200.15"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flight_db"
            - name: DB_USER
              value: "flight_db_user"
            - name: DB_PASSWORD
              value: "flight_db_password"
            - name: REDIS_HOST
              value: "192.168.200.15"
            - name: REDIS_PORT
              value: "6379"
            - name: INFLUXDB_URL
              value: "http://192.168.200.15:8086"
            - name: INFLUXDB_ORG
              value: "Vellur"
            - name: GOOGLE_REDIRECT_URI
              value: "https://cortex.bharatradar.com/auth/callback"
            - name: WS_ENABLED
              value: "false"
            - name: INGRESS_HOST
              value: "cortex.bharatradar.com"
            - name: READSB_RECEIVERS_URL
              value: "http://hub-readsb.bharatradar.svc.cluster.local:150/receivers.json"
          envFrom:
            - secretRef:
                name: google-oauth-credentials
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
            requests:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/filters
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/filters
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
