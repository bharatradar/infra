resources:
- ../base
namePrefix: hub-
patches:
- target:
    kind: Deployment
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/args
      value: ["--net-only", "--net", "--net-receiver-id", "--net-connector=ingest-readsb,30005,beast_in", "--net-bi-port=30004", "--net-bo-port=30005", "--device-type=none", "--max-range=99999", "--write-json=/run/readsb", "--write-receiver-id-json"]
    - op: replace
      path: /spec/template/spec/containers/0/livenessProbe
      value: null
    - op: replace
      path: /spec/template/spec/containers/0/readinessProbe
      value: null
    - op: replace
      path: /spec/template/spec/containers/0/startupProbe
      value: null
