---
apiVersion: v1
kind: Namespace
metadata:
  name: bharatradar
  labels:
    name: bharatradar
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: bharatradar
  labels:
    app: mcp-server
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: mcp-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: bharatradar
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mcp
          image: ghcr.io/bharatradar/mcp-server:v1.0.8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_HOST
              value: "192.168.200.15"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flight_db"
            - name: DB_USER
              value: "flight_db_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flight-db-credentials
                  key: password
            - name: REDIS_HOST
              value: "192.168.200.15"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
          envFrom:
            - configMapRef:
                name: mcp-server-config
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  namespace: bharatradar
data:
  MCP_SERVER_HOST: "0.0.0.0"
  MCP_SERVER_PORT: "8000"