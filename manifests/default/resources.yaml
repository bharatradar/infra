---
apiVersion: v1
kind: Namespace
metadata:
  name: bharatradar
---
# Direct LoadBalancer for ADS-B beast traffic (bypasses haproxy)
apiVersion: v1
kind: Service
metadata:
  name: ingest
  annotations:
    external-dns.alpha.kubernetes.io/hostname: feed.bharatradar.com
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  # Cluster policy allows kube-proxy on ANY node to forward to the pod,
  # even if the pod is on a different node. Required for HA failover
  # when VIP moves to backup but pods haven't rescheduled yet.
  internalTrafficPolicy: Cluster
  externalTrafficPolicy: Cluster
  selector:
    app: ingest
    service: public
  ports:
  - name: beast-30004
    port: 30004
    targetPort: adsb-in
    protocol: TCP
  - name: beast-30005
    port: 30005
    targetPort: adsb-out
    protocol: TCP
  type: LoadBalancer
---
# Direct LoadBalancer for MLAT traffic (bypasses haproxy)
apiVersion: v1
kind: Service
metadata:
  name: mlat-lb
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  # Cluster policy allows kube-proxy on ANY node to forward to the pod,
  # even if the pod is on a different node. Required for HA failover
  # when VIP moves to backup but pods haven't rescheduled yet.
  internalTrafficPolicy: Cluster
  externalTrafficPolicy: Cluster
  selector:
    app: mlat
    service: public
  ports:
  - name: mlat-31090
    port: 31090
    targetPort: mlat-in
    protocol: TCP
  type: LoadBalancer
---
# allow all network in this namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      location /discord {
        return 302 https://discord.gg/3wPfmyNFRq;
      }
      location /todo {
        return 302 https://github.com/bharatradar/infra/issues;
      }
      location /feed {
        return 302 https://github.com/bharatradar/infra?tab=readme-ov-file#feeder;
      }
      location /stats {
        return 302 https://bharatradar.com;
      }
      location /metrics {
        return 200 "ok";
      }
      location /graphs1090 {
        return 302 https://bharatradar.com;
      }
spec:
  tls:
  - hosts:
    - bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: website-website
            port:
              number: 80
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: globe-reapi
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  tls:
  - hosts:
    - map.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: map.bharatradar.com
    http:
      paths:
      - path: /re-api
        pathType: Prefix
        backend:
          service:
            name: planes-readsb
            port:
              name: http-api
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: tar1090
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      location /graphs1090 {
        return 302 https://bharatradar.com;
      }
      location /globeRates.json { return 200 "{\"refresh\": 500}" ;}
spec:
  tls:
  - hosts:
    - map.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: map.bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: planes-readsb
            port:
              name: http
