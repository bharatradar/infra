  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSUV2UUlCQVNDQllDaGR
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: serve-run-http-config
data:
  default.conf: |
    server {
      listen 150;
      server_name _;
      location / {
        root /usr/share/nginx/html;
      }
    }
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: api
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  tls:
  - hosts:
    - api.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: api.bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              name: http
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: my
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  tls:
  - hosts:
    - my.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: my.bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              name: api-internal
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: history
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  tls:
  - hosts:
    - history.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: history.bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: history
            port:
              name: http-nginx
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: map
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  tls:
  - hosts:
    - mlat.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: mlat.bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mlat-map
            port:
              name: http
      - path: /api/0/mlat-server
        pathType: Prefix
        backend:
          service:
            name: mlat-map
            port:
              name: http
      - path: /mlat-data
        pathType: Prefix
        backend:
          service:
            name: mlat-mlat-server
            port:
              number: 150
---
# Rewrite /synctable/0A/ to /synctable/all/
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: map-table
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /synctable/all/$2
spec:
  tls:
  - hosts:
    - mlat.bharatradar.com
    secretName: bharatradar-tls
  rules:
  - host: mlat.bharatradar.com
    http:
      paths:
      - path: /synctable/0A(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: mlat-map
            port:
              name: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-this
spec:
  podSelector: {}
  ingress:
  - from:
    - podSelector: {}
  - from:
    - ipBlock:
        cidr: 10.0.0.0/16
    - ipBlock:
        cidr: 0.0.0.0/0
