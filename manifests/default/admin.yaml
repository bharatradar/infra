---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-service
  namespace: bharatradar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-service
  namespace: bharatradar
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-service
  namespace: bharatradar
subjects:
- kind: ServiceAccount
  name: admin-service
  namespace: bharatradar
roleRef:
  kind: Role
  name: admin-service
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: bharatradar
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      serviceAccountName: admin-service
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: admin
        image: ghcr.io/bharatradar/admin:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_HOST
          value: "45.88.189.38"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "flight_db"
        - name: DB_USER
          value: "flight_db_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flight-db-credentials
              key: password
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: google-oauth-credentials
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: google-oauth-credentials
              key: GOOGLE_CLIENT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: bharatradar
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: admin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin
  namespace: bharatradar
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: admin.bharatradar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin
            port:
              number: 8080
