resources:
- ../base
- flux.yaml
- nginx-config.yaml
- mlat-map-html.yaml
commonLabels:
  name: mlat-map
patches:
- target:
    kind: Deployment
    name: mlat-map
  patch: |-
    - op: add
      path: /spec/template/spec/volumes
      value:
        - name: nginx-conf
          configMap:
            name: mlat-map-nginx
        - name: mlat-html
          configMap:
            name: mlat-map-html
    - op: add
      path: /spec/template/spec/containers/0/volumeMounts
      value:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: mlat-html
          mountPath: /usr/share/nginx/html/syncmap/index.html
          subPath: syncmap-index.html
          readOnly: true
        - name: mlat-html
          mountPath: /usr/share/nginx/html/syncmap/overlay.js
          subPath: syncmap-overlay.js
          readOnly: true
        - name: mlat-html
          mountPath: /usr/share/nginx/html/synctable/index.html
          subPath: synctable-index.html
          readOnly: true
