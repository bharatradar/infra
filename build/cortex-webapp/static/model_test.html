<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatRadar AI</title>
    <style>
        /* --- General Layout --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* --- Message Bubbles --- */
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; position: relative; word-wrap: break-word; }
        .user { background: #1a4a8e; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .bot { background: #1c222d; border: 1px solid #2d3848; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .json-res { font-family: 'Courier New', Courier, monospace; color: #00ff41; background: #000; padding: 10px; border-radius: 5px; margin-top: 8px; overflow-x: auto; white-space: pre-wrap; }

        /* --- Input Area --- */
        #input-area { padding: 20px; background: #161b22; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { padding: 10px 24px; background: #238636; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        button:hover { background: #2ea043; }

        /* --- Loading Animation (Typing Indicator) --- */
        .typing { display: flex; align-items: center; gap: 4px; padding: 10px 15px; }
        .dot { width: 6px; height: 6px; background: #8b949e; border-radius: 50%; animation: bounce 1.3s infinite; }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div id="chat-box">
        <div class="msg bot">✈️ <b>BharatRadar:</b> System ready. How can I help with your flight routing today?</div>
    </div>
    
    <div id="input-area">
        <input type="text" id="query" placeholder="Ask about flights, airports, or alerts..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const queryInput = document.getElementById('query');
        const sendBtn = document.getElementById('send-btn');
        const sessionId = "test_user_" + Math.random().toString(36).substring(2, 15);
        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            // 1. Add User Message
            appendMessage(query, 'user');
            queryInput.value = '';

            // 2. Add Loading Indicator
            const loadingId = 'loading-' + Date.now();
            const loadingHtml = `
                <div class="msg bot" id="${loadingId}">
                    <div class="typing">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>`;
            chatBox.insertAdjacentHTML('beforeend', loadingHtml);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Fetch from FastAPI Backend
                const response = await fetch('/raga_radar_chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, session_id: sessionId})
                });
                
                const result = await response.json();
                
                // 4. Remove Loading and Show Result
                document.getElementById(loadingId).remove();
                
                if (result.status === "success") {
                    const formattedJson = JSON.stringify(result.data, null, 2);
                    appendMessage(`<b>Parsed Intent:</b><div class="json-res">${formattedJson}</div>`, 'bot');
                } else {
                    appendMessage(`<span style="color: #ff7b72;">Error: ${result.message}</span>`, 'bot');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage(`<span style="color: #ff7b72;">Connection error. Is the server running?</span>`, 'bot');
            }
        }

        function appendMessage(content, side) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${side}`;
            msgDiv.innerHTML = side === 'bot' ? `✈️ <b>BharatRadar:</b><br>${content}` : content;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendQuery(); });
    </script>
</body>
</html>
