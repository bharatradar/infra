<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Widget Test</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
</style>
</head>
<body class="p-8">
<h1 class="text-xl font-bold mb-4">Weather Widget Test</h1>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-4 max-w-5xl" id="test-grid">
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-md">
        <p class="text-xs font-bold uppercase tracking-wider">Placeholder 1</p>
        <h3 class="text-xl font-black text-white">--</h3>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-md">
        <p class="text-xs font-bold uppercase tracking-wider">Placeholder 2</p>
        <h3 class="text-xl font-black text-white">--</h3>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-md">
        <p class="text-xs font-bold uppercase tracking-wider">Placeholder 3</p>
        <h3 class="text-xl font-black text-white">--</h3>
    </div>
    <!-- Weather Card (compact, click to expand) -->
    <div id="weather-widget" class="hidden cursor-pointer bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-md hover:border-blue-500/50 transition relative">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 min-w-0">
                <span id="weather-icon" class="text-2xl flex-shrink-0">☀️</span>
                <div class="min-w-0">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider truncate" id="weather-airport-name">Weather</p>
                    <div class="flex items-baseline gap-1.5">
                        <span id="weather-temp" class="text-xl font-black text-white">--</span>
                        <span id="weather-desc" class="text-xs text-gray-400 truncate">--</span>
                    </div>
                </div>
            </div>
            <div class="text-right flex-shrink-0">
                <span id="weather-wind" class="text-sm font-bold text-blue-400 block">--</span>
                <span class="text-[10px] text-gray-500">Wind</span>
            </div>
        </div>
        <!-- Expanded details (hidden by default) -->
        <div id="weather-expanded" class="hidden mt-3 pt-3 border-t border-slate-700 space-y-3">
            <div class="grid grid-cols-2 gap-3 text-xs">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-eye text-green-400 w-4 text-center"></i>
                    <div>
                        <span id="weather-visibility" class="text-white font-bold">--</span>
                        <span class="text-gray-500 ml-1">Vis</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-gauge text-yellow-400 w-4 text-center"></i>
                    <div>
                        <span id="weather-pressure" class="text-white font-bold">--</span>
                        <span class="text-gray-500 ml-1">hPa</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-droplet text-cyan-400 w-4 text-center"></i>
                    <div>
                        <span id="weather-humidity" class="text-white font-bold">--</span>
                        <span class="text-gray-500 ml-1">Humidity</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-gray-500" id="weather-updated"></span>
                </div>
            </div>
            <div id="weather-forecast" class="flex gap-1.5 overflow-x-auto"></div>
        </div>
        <div class="absolute bottom-1 right-2 text-[10px] text-gray-600">
            <i class="fa-solid fa-chevron-down" id="weather-chevron"></i>
        </div>
    </div>
</div>

<div class="mb-4">
    <label class="block text-sm mb-1">Select ICAO:</label>
    <select id="icao-select" class="bg-slate-700 text-white border border-slate-600 rounded-lg px-3 py-2 text-sm">
        <option value="VABB">Mumbai (VABB)</option>
        <option value="VIDP">Delhi (VIDP)</option>
        <option value="VOMM">Chennai (VOMM)</option>
        <option value="VOBL">Bengaluru (VOBL)</option>
    </select>
    <button onclick="fetchWeather()" class="ml-2 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-bold">Fetch Weather</button>
    <button onclick="resetWidget()" class="ml-2 bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm">Reset</button>
</div>

<pre id="debug" class="text-xs text-green-400 bg-slate-900 p-4 rounded-lg border border-slate-700 max-w-5xl overflow-auto" style="min-height:100px;"></pre>

<script>
function log(msg) {
    const d = document.getElementById('debug');
    d.textContent += msg + '\n';
    console.log(msg);
}

async function fetchWeather() {
    const icao = document.getElementById('icao-select').value;
    log(`Fetching weather for ${icao}...`);
    
    try {
        const res = await fetch(`/api/weather/${icao}`);
        log(`Response status: ${res.status}`);
        const data = await res.json();
        log(`Data received: ${JSON.stringify(data).substring(0, 200)}...`);
        
        displayWeather(data);
    } catch(e) {
        log(`ERROR: ${e}`);
    }
}

function toggleWeatherExpand() {
    const expanded = document.getElementById('weather-expanded');
    const chevron = document.getElementById('weather-chevron');
    const isHidden = expanded.classList.contains('hidden');
    expanded.classList.toggle('hidden');
    chevron.className = isHidden ? 'fa-solid fa-chevron-up' : 'fa-solid fa-chevron-down';
    log(`Toggled expand: ${isHidden ? 'shown' : 'hidden'}`);
}

function displayWeather(data) {
    const widget = document.getElementById('weather-widget');
    log(`Widget before: classes=${widget.className}`);
    widget.classList.remove('hidden');
    log(`Widget after: classes=${widget.className}`);
    
    const current = data.current || {};
    const airportName = data.airport || data.icao || '';
    const weatherCode = current.weather_code || 0;
    const iconMap = {
        0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
        45: '🌫️', 48: '🌫️',
        51: '🌦️', 53: '🌦️', 55: '🌦️',
        56: '🌧️', 57: '🌧️',
        61: '🌧️', 63: '🌧️', 65: '🌧️',
        66: '🌧️', 67: '🌧️',
        71: '❄️', 73: '❄️', 75: '❄️', 77: '❄️',
        80: '🌦️', 81: '🌦️', 82: '🌦️',
        85: '❄️', 86: '❄️',
        95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    
    document.getElementById('weather-airport-name').textContent = airportName;
    document.getElementById('weather-icon').textContent = iconMap[weatherCode] || '☀️';
    document.getElementById('weather-temp').textContent = current.temperature_2m != null ? `${Math.round(current.temperature_2m)}°C` : '--';
    document.getElementById('weather-desc').textContent = current.weather_description || '--';
    
    const windDir = current.wind_direction_10m != null ? ` ${current.wind_direction_10m}°` : '';
    document.getElementById('weather-wind').textContent = current.wind_speed_10m != null ? `${current.wind_speed_10m} kn${windDir}` : '--';
    
    const vis = current.visibility;
    document.getElementById('weather-visibility').textContent = vis != null ? vis >= 1000 ? `${(vis / 1000).toFixed(1)} km` : `${vis} m` : '--';
    document.getElementById('weather-pressure').textContent = current.pressure_msl != null ? `${current.pressure_msl} hPa` : '--';
    document.getElementById('weather-humidity').textContent = current.relative_humidity_2m != null ? `${current.relative_humidity_2m}%` : '--';
    document.getElementById('weather-updated').textContent = data.cached_at ? new Date(data.cached_at).toLocaleTimeString() : '';
    
    const forecastContainer = document.getElementById('weather-forecast');
    forecastContainer.innerHTML = '';
    if (data.hourly && data.hourly.length > 0) {
        data.hourly.slice(0, 6).forEach(h => {
            const time = new Date(h.time);
            const hour = time.getHours();
            const icon = iconMap[h.weather_code] || '☀️';
            const div = document.createElement('div');
            div.className = 'flex flex-col items-center min-w-[52px] py-1 px-1.5 rounded bg-gray-800/40';
            div.innerHTML = `
                <span class="text-[10px] text-gray-400">${hour}:00</span>
                <span class="text-base">${icon}</span>
                <span class="text-xs font-bold text-white">${h.temperature_2m != null ? Math.round(h.temperature_2m) : '--'}°</span>
            `;
            forecastContainer.appendChild(div);
        });
    }
    
    log('displayWeather completed successfully');
    log(`Widget computed style: display=${getComputedStyle(widget).display}`);
}

function resetWidget() {
    const widget = document.getElementById('weather-widget');
    widget.classList.add('hidden');
    document.getElementById('weather-airport-name').textContent = 'Weather';
    document.getElementById('weather-temp').textContent = '--';
    document.getElementById('weather-desc').textContent = '--';
    document.getElementById('weather-icon').textContent = '☀️';
    document.getElementById('weather-wind').textContent = '--';
    document.getElementById('weather-visibility').textContent = '--';
    document.getElementById('weather-pressure').textContent = '--';
    document.getElementById('weather-humidity').textContent = '--';
    document.getElementById('weather-updated').textContent = '';
    document.getElementById('weather-forecast').innerHTML = '';
    document.getElementById('weather-expanded').classList.add('hidden');
    document.getElementById('weather-chevron').className = 'fa-solid fa-chevron-down';
    log('Widget reset');
}

log('Weather test page loaded. Ready. Test by selecting ICAO and clicking "Fetch Weather".');
</script>
</body>
</html>
