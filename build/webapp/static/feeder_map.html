<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeder Coverage Map | Bharat Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 140px); min-height: 500px; }
        .feeder-popup { font-family: system-ui, sans-serif; }
        .tier-platinum { color: #9ca3af; }
        .tier-gold { color: #fbbf24; }
        .tier-silver { color: #d1d5db; }
        .tier-bronze { color: #fdba74; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <!-- Header -->
    <div class="bg-gray-800 border-b border-gray-700 px-4 py-3">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="/command_center/profile" class="text-gray-400 hover:text-white">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="text-xl font-bold">🗺️ Feeder Coverage Map</h1>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm text-gray-400" id="feeder-count">Loading...</span>
                <select id="tier-filter" class="bg-gray-700 border border-gray-600 rounded px-3 py-1 text-sm text-white">
                    <option value="">All Tiers</option>
                    <option value="PLATINUM">Platinum</option>
                    <option value="GOLD">Gold</option>
                    <option value="SILVER">Silver</option>
                    <option value="BRONZE">Bronze</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="bg-gray-800 border-b border-gray-700 px-4 py-2">
        <div class="container mx-auto flex gap-6 text-sm">
            <span class="text-gray-400">Active Feeders: <strong id="stat-active" class="text-white">-</strong></span>
            <span class="text-gray-400">Coverage Radius: <strong id="stat-radius" class="text-white">-</strong> km avg</span>
            <span class="text-gray-400">Total Messages: <strong id="stat-messages" class="text-white">-</strong></span>
        </div>
    </div>

    <!-- Map -->
    <div id="map" class="w-full"></div>

    <!-- Legend -->
    <div class="absolute bottom-4 left-4 bg-gray-800 border border-gray-700 rounded-lg p-3 z-[1000] shadow-lg">
        <h4 class="text-sm font-bold mb-2">Tier Colors</h4>
        <div class="space-y-1 text-xs">
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-gray-400"></span> Platinum</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-yellow-400"></span> Gold</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-gray-300"></span> Silver</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-400"></span> Bronze</div>
        </div>
    </div>

    <script>
        const API_BASE = '/command_center/api';
        let map, markers = [], circles = [];
        let allFeeders = [];

        const TIER_COLORS = {
            'PLATINUM': '#9ca3af',
            'GOLD': '#fbbf24',
            'SILVER': '#d1d5db',
            'BRONZE': '#fdba74'
        };

        function initMap() {
            map = L.map('map').setView([20.5937, 78.9629], 5); // Center on India

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);

            loadFeeders();
        }

        async function loadFeeders() {
            try {
                const res = await fetch(`${API_BASE}/feeders/map`);
                const data = await res.json();
                allFeeders = data.feeders || [];
                renderFeeders(allFeeders);
                updateStats(allFeeders);
            } catch (e) {
                console.error('Map load error:', e);
            }
        }

        function renderFeeders(feeders) {
            // Clear existing
            markers.forEach(m => map.removeLayer(m));
            circles.forEach(c => map.removeLayer(c));
            markers = [];
            circles = [];

            feeders.forEach(f => {
                if (!f.lat || !f.lon) return;

                const color = TIER_COLORS[f.tier] || '#3b82f6';
                const radius = (f.max_range || 100) * 1000; // meters

                // Coverage circle
                const circle = L.circle([f.lat, f.lon], {
                    radius: radius,
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.15,
                    weight: 1
                }).addTo(map);
                circles.push(circle);

                // Marker
                const marker = L.circleMarker([f.lat, f.lon], {
                    radius: 8,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.9
                }).addTo(map);

                // Popup
                const popupContent = `
                    <div class="feeder-popup">
                        <strong>${f.display_name}</strong><br>
                        <span style="color:${color}">● ${f.tier}</span><br>
                        📍 ${f.location || 'Unknown'}<br>
                        📡 Range: ${f.max_range || 100} km<br>
                        📊 Messages: ${formatNumber(f.daily_messages || 0)}
                        <br><br>
                        <a href="/command_center/feeders/account/${f.id}" target="_blank">View Dashboard →</a>
                    </div>
                `;
                marker.bindPopup(popupContent);
                markers.push(marker);
            });
        }

        function updateStats(feeders) {
            document.getElementById('feeder-count').textContent = `${feeders.length} feeders`;
            document.getElementById('stat-active').textContent = feeders.length;

            const avgRange = feeders.length > 0
                ? Math.round(feeders.reduce((a, f) => a + (f.max_range || 100), 0) / feeders.length)
                : 0;
            document.getElementById('stat-radius').textContent = avgRange;

            const totalMsgs = feeders.reduce((a, f) => a + (f.daily_messages || 0), 0);
            document.getElementById('stat-messages').textContent = formatNumber(totalMsgs);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Tier filter
        document.getElementById('tier-filter').addEventListener('change', (e) => {
            const tier = e.target.value;
            const filtered = tier ? allFeeders.filter(f => f.tier === tier) : allFeeders;
            renderFeeders(filtered);
        });

        initMap();
    </script>
</body>
</html>
